name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: setup jdk
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'microsoft'
      - name: setup gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: install texture generator dependencies
        run: python -m pip install -r requirements.txt
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+mc[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Release tags must match v<major>.<minor>.<patch>+mc<mc-version>."
            exit 1
          fi
      - name: verify release artifacts
        run: |
          version="${GITHUB_REF_NAME#v}"
          test -f "build/libs/multigolem-${version}.jar"
          test -f "build/libs/multigolem-${version}-sources.jar"
      - name: extract changelog notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^##[[:space:]]+" version "([[:space:]]+[-–—][[:space:]]+.*)?$" {
              capture = 1
              next
            }
            capture && /^## / {
              exit
            }
            capture {
              print
            }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d' > release-notes.md
      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_args=(--generate-notes)
          if [ -s release-notes.md ]; then
            notes_args=(--notes-file release-notes.md)
          fi

          gh release create "${GITHUB_REF_NAME}" \
            "build/libs/multigolem-${version}.jar" \
            "build/libs/multigolem-${version}-sources.jar" \
            --title "${GITHUB_REF_NAME}" \
            "${notes_args[@]}"
      - name: publish modrinth release
        shell: pwsh
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          ./scripts/upload-modrinth.ps1 `
            -Slug "multigolem" `
            -Version $version `
            -JarPath "build/libs/multigolem-$version.jar" `
            -SourcesJarPath "build/libs/multigolem-$version-sources.jar" `
            -ChangelogPath "release-notes.md"
      - name: publish curseforge release
        shell: pwsh
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          ./scripts/upload-curseforge.ps1 `
            -Slug "multigolem" `
            -Version $version `
            -JarPath "build/libs/multigolem-$version.jar" `
            -ChangelogPath "release-notes.md"
