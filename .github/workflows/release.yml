name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: setup jdk
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'microsoft'
      - name: setup gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: install texture generator dependencies
        run: python -m pip install -r requirements.txt
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+mc[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Release tags must match v<major>.<minor>.<patch>+mc<mc-version>."
            exit 1
          fi
      - name: verify release artifacts
        run: |
          version="${GITHUB_REF_NAME#v}"
          test -f "fabric/build/libs/multigolem-${version}-fabric.jar"
          test -f "fabric/build/libs/multigolem-${version}-fabric-sources.jar"
          test -f "neoforge/build/libs/multigolem-${version}-neoforge.jar"
          test -f "neoforge/build/libs/multigolem-${version}-neoforge-sources.jar"
      - name: extract changelog notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          python scripts/extract-changelog-section.py --section "$version" > release-notes.md
      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_args=(--generate-notes)
          if [ -s release-notes.md ]; then
            notes_args=(--notes-file release-notes.md)
          fi

          gh release create "${GITHUB_REF_NAME}" \
            "fabric/build/libs/multigolem-${version}-fabric.jar" \
            "fabric/build/libs/multigolem-${version}-fabric-sources.jar" \
            "neoforge/build/libs/multigolem-${version}-neoforge.jar" \
            "neoforge/build/libs/multigolem-${version}-neoforge-sources.jar" \
            --title "${GITHUB_REF_NAME}" \
            "${notes_args[@]}"
      - name: publish modrinth release
        shell: pwsh
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          ./scripts/upload-modrinth.ps1 `
            -Slug "multigolem" `
            -Loader "fabric" `
            -Version $version `
            -JarPath "fabric/build/libs/multigolem-$version-fabric.jar" `
            -SourcesJarPath "fabric/build/libs/multigolem-$version-fabric-sources.jar" `
            -ChangelogPath "release-notes.md"
          ./scripts/upload-modrinth.ps1 `
            -Slug "multigolem" `
            -Loader "neoforge" `
            -Version $version `
            -JarPath "neoforge/build/libs/multigolem-$version-neoforge.jar" `
            -SourcesJarPath "neoforge/build/libs/multigolem-$version-neoforge-sources.jar" `
            -ChangelogPath "release-notes.md"
      - name: publish curseforge release
        shell: pwsh
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          ./scripts/upload-curseforge.ps1 `
            -Slug "multigolem" `
            -Loader "fabric" `
            -Version $version `
            -JarPath "fabric/build/libs/multigolem-$version-fabric.jar" `
            -ChangelogPath "release-notes.md"
          ./scripts/upload-curseforge.ps1 `
            -Slug "multigolem" `
            -Loader "neoforge" `
            -Version $version `
            -JarPath "neoforge/build/libs/multigolem-$version-neoforge.jar" `
            -ChangelogPath "release-notes.md"
