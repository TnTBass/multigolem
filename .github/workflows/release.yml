name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Release tag to publish from, for example v0.6.1+mc26.2'
        required: true
      publish_target:
        description: 'Publisher to run'
        required: true
        default: curseforge
        type: choice
        options:
          - all
          - curseforge

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}
          fetch-depth: 0
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: setup jdk
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 25
          distribution: 'microsoft'
      - name: setup gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: install texture generator dependencies
        run: python -m pip install -r requirements.txt
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: validate release tag
        run: |
          if [[ ! "${RELEASE_REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+mc[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Release tags must match v<major>.<minor>.<patch>+mc<mc-version>."
            exit 1
          fi
      - name: verify release artifacts
        run: |
          version="${RELEASE_REF#v}"
          test -f "fabric/build/libs/multigolem-fabric-${version}.jar"
          test -f "fabric/build/libs/multigolem-fabric-${version}-sources.jar"
          test -f "neoforge/build/libs/multigolem-neoforge-${version}.jar"
          test -f "neoforge/build/libs/multigolem-neoforge-${version}-sources.jar"
      - name: extract changelog notes
        run: |
          version="${RELEASE_REF#v}"
          python scripts/extract-changelog-section.py --section "$version" > release-notes.md
      - name: create github release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_target == 'all' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${RELEASE_REF#v}"
          notes_args=(--generate-notes)
          if [ -s release-notes.md ]; then
            notes_args=(--notes-file release-notes.md)
          fi

          gh release create "${RELEASE_REF}" \
            "fabric/build/libs/multigolem-fabric-${version}.jar" \
            "fabric/build/libs/multigolem-fabric-${version}-sources.jar" \
            "neoforge/build/libs/multigolem-neoforge-${version}.jar" \
            "neoforge/build/libs/multigolem-neoforge-${version}-sources.jar" \
            --title "${RELEASE_REF}" \
            "${notes_args[@]}"
      - name: publish modrinth release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_target == 'all' }}
        shell: pwsh
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          $version = $env:RELEASE_REF.Substring(1)
          ./scripts/upload-modrinth.ps1 `
            -Slug "multigolem" `
            -Loader "fabric" `
            -Version $version `
            -JarPath "fabric/build/libs/multigolem-fabric-$version.jar" `
            -SourcesJarPath "fabric/build/libs/multigolem-fabric-$version-sources.jar" `
            -ChangelogPath "release-notes.md"
          ./scripts/upload-modrinth.ps1 `
            -Slug "multigolem" `
            -Loader "neoforge" `
            -Version $version `
            -JarPath "neoforge/build/libs/multigolem-neoforge-$version.jar" `
            -SourcesJarPath "neoforge/build/libs/multigolem-neoforge-$version-sources.jar" `
            -ChangelogPath "release-notes.md"
      - name: publish curseforge release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_target == 'all' || inputs.publish_target == 'curseforge' }}
        shell: pwsh
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        run: |
          $version = $env:RELEASE_REF.Substring(1)
          ./scripts/upload-curseforge.ps1 `
            -Slug "multigolem" `
            -Loader "fabric" `
            -Version $version `
            -JarPath "fabric/build/libs/multigolem-fabric-$version.jar" `
            -ChangelogPath "release-notes.md"
          ./scripts/upload-curseforge.ps1 `
            -Slug "multigolem" `
            -Loader "neoforge" `
            -Version $version `
            -JarPath "neoforge/build/libs/multigolem-neoforge-$version.jar" `
            -ChangelogPath "release-notes.md"
