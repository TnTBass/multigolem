name: update modrinth metadata

on:
  workflow_dispatch:
    inputs:
      version_id:
        description: Modrinth version ID to update
        required: true
        type: string
      version:
        description: Version section to read from CHANGELOG.md
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-modrinth-metadata:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: update modrinth project description and version changelog
        shell: pwsh
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          ./scripts/update-modrinth-metadata.ps1 `
            -Slug "multigolem" `
            -VersionId "${{ inputs.version_id }}" `
            -Version "${{ inputs.version }}" `
            -SyncDescription `
            -SyncVersionChangelog
