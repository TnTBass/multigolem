plugins {
	id 'base'
}
allprojects {
	version = rootProject.mod_version
	group = rootProject.maven_group
}

def gitShortCommit = {
	try {
		def process = new ProcessBuilder("git", "-C", rootDir.absolutePath, "rev-parse", "--short", "HEAD")
			.redirectErrorStream(true)
			.start()
		process.waitFor()
		def value = process.inputStream.getText("UTF-8").trim()
		if (process.exitValue() != 0) return null
		return value.isEmpty() ? null : value
	} catch (Exception ignored) {
		return null
	}
}
ext.gitShortCommit = { -> gitShortCommit() }

tasks.register("checkChangelog") {
	group = "verification"
	description = "Requires CHANGELOG.md Unreleased notes for releasable changes."

	doLast {
		def githubActor = System.getenv("GITHUB_ACTOR") ?: ""
		if (githubActor == "dependabot[bot]") {
			logger.lifecycle("Dependabot actor detected; changelog gate skipped.")
			return
		}

		def githubHeadRef = System.getenv("GITHUB_HEAD_REF") ?: ""
		def githubRefName = System.getenv("GITHUB_REF_NAME") ?: ""
		if (githubHeadRef.startsWith("dependabot/") || githubRefName.startsWith("dependabot/")) {
			logger.lifecycle("Dependabot ref detected; changelog gate skipped.")
			return
		}

		def gitOutput = { List<String> args ->
			def result = providers.exec {
				commandLine(["git"] + args)
				ignoreExitValue = true
			}

			return result.result.get().exitValue == 0 ? result.standardOutput.asText.get().trim() : ""
		}

		def refExists = { String ref ->
			providers.exec {
				commandLine("git", "rev-parse", "--verify", "--quiet", ref)
				ignoreExitValue = true
			}.result.get().exitValue == 0
		}

		def baseRef = System.getenv("BASE_REF") ?: System.getenv("GITHUB_BASE_REF") ?: "main"
		def base = refExists("origin/${baseRef}") ? "origin/${baseRef}" : refExists(baseRef) ? baseRef : null
		def mergeBase = base ? gitOutput(["merge-base", "HEAD", base]) : ""
		if (!mergeBase) {
			mergeBase = gitOutput(["rev-list", "--max-parents=0", "HEAD"]).readLines().first()
		}

		def generatedTextureOutputPattern = ~/^src\/common\/resources\/assets\/multigolem\/textures\/(entity|item)\/.*\.png$/
		def changedFiles = new TreeSet<String>()
		[
			[args: ["diff", "--name-only", "${mergeBase}...HEAD"], ignoreGeneratedOutputs: false],
			[args: ["diff", "--name-only"], ignoreGeneratedOutputs: true],
			[args: ["diff", "--name-only", "--cached"], ignoreGeneratedOutputs: false],
			[args: ["ls-files", "--others", "--exclude-standard"], ignoreGeneratedOutputs: false]
		].each { item ->
			def args = item.args
			gitOutput(args).readLines()
				.findAll { it }
				.findAll { !(item.ignoreGeneratedOutputs && it ==~ generatedTextureOutputPattern) }
				.each { changedFiles.add(it) }
		}

		if (changedFiles.isEmpty()) {
			logger.lifecycle("No changed files found; changelog gate skipped.")
			return
		}

		def dependabotOnlyBranches = gitOutput(["branch", "--show-current"]).startsWith("dependabot/")
		if (dependabotOnlyBranches) {
			logger.lifecycle("Dependabot branch detected; changelog gate skipped.")
			return
		}

		def releasablePattern = ~/^(src\/(common|commonClient|fabric|fabricClient|neoforge|neoforgeClient)\/|build\.gradle|settings\.gradle|gradle\.properties|gradle\/|\.github\/workflows\/|README\.md$)/
		def releasableFiles = changedFiles.findAll { it ==~ releasablePattern || it.find(releasablePattern) }

		if (releasableFiles.isEmpty()) {
			logger.lifecycle("No releasable changes found; changelog gate skipped.")
			return
		}

		def changelogFiles = ["CHANGELOG.md", "INTERNAL_CHANGELOG.md"]
		def changedChangelogFiles = changelogFiles.findAll { changedFiles.contains(it) }
		if (changedChangelogFiles.isEmpty()) {
			throw new GradleException("Releasable or release-process changes require a CHANGELOG.md or INTERNAL_CHANGELOG.md update under Unreleased.\n\nReleasable files:\n${releasableFiles.join("\n")}")
		}

		def publicFacingPattern = ~/^(src\/(common|commonClient|fabric|fabricClient)\/|README\.md$)/
		def publicFacingFiles = releasableFiles.findAll { it ==~ publicFacingPattern || it.find(publicFacingPattern) }
		if (!publicFacingFiles.isEmpty() && !changedFiles.contains("CHANGELOG.md")) {
			throw new GradleException("Player/server-admin-facing changes require a CHANGELOG.md update, not only INTERNAL_CHANGELOG.md.\n\nPublic-facing files:\n${publicFacingFiles.join("\n")}")
		}

		def hasBullet = changedChangelogFiles.any { changelogFile ->
			def changelog = file(changelogFile).text.readLines()
			def inUnreleased = false
			for (line in changelog) {
				if (line ==~ /^##\s+Unreleased\s*$/) {
					inUnreleased = true
					continue
				}

				if (inUnreleased && line ==~ /^##\s+.*/) {
					break
				}

				if (inUnreleased && line ==~ /^-\s+.*/) {
					return true
				}
			}
			return false
		}
		def hasReleaseSection = changedChangelogFiles.any { changelogFile ->
			file(changelogFile).text.readLines().any { it ==~ /^##\s+\d+\.\d+\.\d+.*$/ }
		}

		if (!hasBullet && !hasReleaseSection) {
			throw new GradleException("Changed changelog file must contain at least one bullet under '## Unreleased' or a versioned release section.")
		}

		logger.lifecycle("Changelog gate passed.")
	}
}

tasks.register("checkWrapperChecksum") {
	group = "verification"
	description = "Requires Gradle wrapper distribution checksum pinning."

	doLast {
		def wrapperProperties = file("gradle/wrapper/gradle-wrapper.properties").text
		if (!(wrapperProperties =~ /(?m)^distributionSha256Sum=[a-f0-9]{64}$/)) {
			throw new GradleException("gradle-wrapper.properties must pin distributionSha256Sum to the official Gradle distribution checksum.")
		}

		logger.lifecycle("Gradle wrapper checksum gate passed.")
	}
}

tasks.register("checkReleaseNotesStyle") {
	group = "verification"
	description = "Requires CHANGELOG.md release notes to be written for players and server admins."

	inputs.file("CHANGELOG.md")
	inputs.file("scripts/check-changelog-style.py")

	doLast {
		def python = providers.environmentVariable("PYTHON").getOrElse("python")
		def githubRefName = System.getenv("GITHUB_REF_NAME") ?: ""
		def section = githubRefName.startsWith("v") ? githubRefName.substring(1) : "Unreleased"
		def result = providers.exec {
			commandLine(python, "scripts/check-changelog-style.py", "--section", section)
			ignoreExitValue = true
		}
		def stdout = result.standardOutput.asText.get()
		def stderr = result.standardError.asText.get()
		if (!stdout.isBlank()) {
			logger.lifecycle(stdout)
		}
		if (!stderr.isBlank()) {
			logger.error(stderr)
		}
		if (result.result.get().exitValue != 0) {
			throw new GradleException("Release notes style gate failed for CHANGELOG.md section '${section}'.")
		}
	}
}

