tasks.register("checkUnitTestCompanions") {
	group = "verification"
	description = "Requires unit-test companions for pure helper/state classes."

	doLast {
		def requiredTestFiles = fileTree("src/common/java").matching {
			include "**/*Config.java"
			include "**/*Resolver.java"
		}.files.collect { mainFile ->
			def relativePath = projectDir.toPath().relativize(mainFile.toPath()).toString().replace(File.separatorChar, '/' as char)
			def testPath = relativePath
					.replace("src/common/java/", "src/test/java/")
					.replace(".java", "Test.java")
			file(testPath)
		}

		def missing = requiredTestFiles.findAll { !it.exists() }
		if (!missing.isEmpty()) {
			throw new GradleException("Pure helper/state classes require companion unit tests:\n${missing.collect { projectDir.toPath().relativize(it.toPath()) }.join("\n")}")
		}

		logger.lifecycle("Unit-test companion gate passed.")
	}
}

tasks.register("checkCommonSourceSetsLoaderNeutral") {
	group = "verification"
	description = "Prevents loader APIs from leaking into common multiloader source roots."

	doLast {
		def roots = ["src/common", "src/commonClient"].collect { file(it) }.findAll { it.exists() }
		if (roots.isEmpty()) {
			logger.lifecycle("No multiloader common roots yet; loader-neutral scan skipped.")
			return
		}
		def forbidden = ~/(?m)^\s*import\s+(net\.fabricmc|net\.neoforged|com\.terraformersmc\.modmenu|me\.lucko\.fabric)\./
		def offenders = []
		roots.each { root ->
			fileTree(root).matching { include "**/*.java" }.files.each { source ->
				def text = source.getText("UTF-8")
				if ((text =~ forbidden).find()) {
					offenders.add(projectDir.toPath().relativize(source.toPath()).toString().replace(File.separatorChar, '/' as char))
				}
			}
		}
		if (!offenders.isEmpty()) {
			throw new GradleException("Common source roots contain loader-specific imports:\n${offenders.join("\n")}")
		}
		logger.lifecycle("Common source-set loader-neutral scan passed.")
	}
}

tasks.register("releaseReminder") {
	group = "verification"
	description = "Prints a release reminder when Unreleased changelog entries exist."

	doLast {
		if (!file("CHANGELOG.md").exists()) return

		def changelog = file("CHANGELOG.md").text.readLines()
		def inUnreleased = false
		def unreleasedEntries = []
		for (line in changelog) {
			if (line ==~ /^##\s+Unreleased\s*$/) {
				inUnreleased = true
				continue
			}

			if (inUnreleased && line ==~ /^##\s+.*/) {
				break
			}

			if (inUnreleased && line ==~ /^-\s+.*/) {
				unreleasedEntries.add(line)
			}
		}

		if (unreleasedEntries.isEmpty()) return

		logger.lifecycle("")
		logger.lifecycle("Release reminder:")
		logger.lifecycle("CHANGELOG.md has ${unreleasedEntries.size()} Unreleased entr${unreleasedEntries.size() == 1 ? "y" : "ies"}.")
		logger.lifecycle("When this work is ready to ship, ask Codex to prep a release.")
		logger.lifecycle("Suggested release-prep steps: choose patch/minor/major, bump mod_version, build the jar, tag the release.")
		logger.lifecycle("")
	}
}

tasks.named("check") {
	// V4-specific guard: keep reviewed handoff artifacts intact through the V4 branch lifecycle.
	dependsOn(":fabric:test", ":fabric:build", ":neoforge:build", "checkChangelog", "checkWrapperChecksum", "checkReleaseNotesStyle", "checkV4PlanningHandoff", "checkReleaseDocs", "checkMultiloaderReleaseSources", "checkUnitTestCompanions", "checkCommonSourceSetsLoaderNeutral")
}

tasks.named("build") {
	dependsOn(":fabric:build", ":neoforge:build")
	finalizedBy("releaseReminder")
}

tasks.register("genTextures") {
    group = "build"
    description = "Regenerate per-tier golem textures from build-inputs/textures/iron_golem.template.png"

    inputs.file("build-inputs/textures/iron_golem.template.png")
    inputs.file("scripts/generate-textures.py")
    outputs.dir("src/common/resources/assets/multigolem/textures/entity")

    doLast {
        def python = providers.environmentVariable("PYTHON").getOrElse("python")
        def result = providers.exec {
            commandLine(python, "scripts/generate-textures.py")
            ignoreExitValue = true
        }
        if (result.result.get().exitValue != 0) {
            def stdout = result.standardOutput.asText.get()
            def stderr = result.standardError.asText.get()
            if (!stdout.isBlank()) {
                logger.error(stdout)
            }
            if (!stderr.isBlank()) {
                logger.error(stderr)
            }
            throw new GradleException("genTextures: scripts/generate-textures.py failed with exit ${result.result.get().exitValue}")
        }
    }
}
